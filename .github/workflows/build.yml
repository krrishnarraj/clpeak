name: Build

on:
  push:
    paths-ignore:
      - 'results/**'
    branches: [master, main]
    tags: ["*"]
  pull_request:
    paths-ignore:
        - 'results/**'
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Desktop builds (Linux x64, Linux arm64, Windows x64, macOS arm64)
  # ---------------------------------------------------------------------------
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-latest
            artifact: clpeak-linux-x86_64
            binary: build/clpeak
            suffix: ""
            cuda: false

          - name: Linux arm64
            runner: ubuntu-24.04-arm
            artifact: clpeak-linux-arm64
            binary: build/clpeak
            suffix: ""
            cuda: false

          - name: Windows x64
            runner: windows-latest
            artifact: clpeak-windows-x86_64
            binary: build/Release/clpeak.exe
            suffix: ""
            cuda: false

          - name: Windows arm64
            runner: windows-11-arm
            artifact: clpeak-windows-arm64
            binary: build/Release/clpeak.exe
            suffix: ""
            cuda: false

          - name: macOS arm64
            runner: macos-latest
            artifact: clpeak-macos-arm64
            binary: build/clpeak
            suffix: ""
            cuda: false

          - name: Linux x64 CUDA
            runner: ubuntu-latest
            artifact: clpeak-linux-x86_64-cuda
            binary: build/clpeak
            suffix: cuda
            cuda: true

          - name: Linux x64 ROCm
            runner: ubuntu-24.04
            artifact: clpeak-linux-x86_64-rocm
            binary: build/clpeak
            suffix: rocm
            cuda: false
            rocm: true

          - name: Linux x64 oneAPI
            runner: ubuntu-latest
            artifact: clpeak-linux-x86_64-oneapi
            binary: build/clpeak
            suffix: oneapi
            cuda: false
            oneapi: true

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git-describe versioning

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # clang: the root CMake prefers it over GCC on Linux for the CPU backend
          # (GCC<=14 serialises the FMA accumulator chains, ~halving fp32/fp64).
          sudo apt-get install -y --no-install-recommends build-essential clang

      - name: Install Vulkan SDK
        if: runner.os != 'macOS'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: true
          cache: true

      # CUDA Toolkit: install only for CUDA-enabled matrix entries.  Pin to a
      # Blackwell-capable toolkit (12.8+) so nvcc can target sm_100/sm_120 and
      # the fp4/mxfp4 fatbins are built rather than stubbed.
      - name: Install CUDA Toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.35

      # ROCm SDK (HIP runtime + hipcc + rocBLAS + hipBLASLt + rocWMMA): install
      # only for ROCm-enabled matrix entries.  ROCm 6.4 on Ubuntu 24.04 (noble)
      # covers gfx950 / gfx12 (RDNA4) so the AOT code objects target current
      # GPUs.  The runner image has no AMD GPU, so the built binary will not
      # execute the ROCm backend here; this job exercises the AOT compile path.
      - name: Install ROCm
        if: matrix.rocm
        run: |
          sudo mkdir --parents --mode=0755 /etc/apt/keyrings
          wget -O- https://repo.radeon.com/rocm/rocm.gpg.key \
            | gpg --dearmor | sudo tee /etc/apt/keyrings/rocm.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/6.4 noble main" \
            | sudo tee /etc/apt/sources.list.d/rocm.list
          echo -e "Package: *\nPin: release o=repo.radeon.com\nPin-Priority: 600" \
            | sudo tee /etc/apt/preferences.d/rocm-pin-600
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            rocm-hip-runtime-dev hipcc rocblas-dev hipblaslt-dev rocwmma-dev

      # Intel oneAPI Base Toolkit: DPC++ compiler (icpx) + oneMKL.  Same
      # caveat as ROCm above — the runner has no Intel GPU, so the resulting
      # binary will skip the oneAPI backend at run time.
      - name: Install Intel oneAPI
        if: matrix.oneapi
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            intel-oneapi-compiler-dpcpp-cpp intel-oneapi-mkl-devel

      - name: Configure CMake & Build
        if: ${{ !matrix.oneapi }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCLPEAK_PACKAGE_SUFFIX=${{ matrix.suffix }}
          cmake --build build --config Release -j4

      # oneAPI requires icpx as CXX and `setvars.sh` on the PATH/LD_LIBRARY_PATH;
      # source it before invoking cmake/build so IntelSYCL can be located.
      - name: Configure Cmake & Build oneAPI
        if: matrix.oneapi
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=icpx -DCLPEAK_PACKAGE_SUFFIX=${{ matrix.suffix }}
          cmake --build build --config Release -j4

      - name: Run
        if: ${{ !matrix.cuda && !matrix.oneapi }}
        shell: bash
        run: ${{ matrix.binary }}

      # CUDA: the runner has no GPU, so the real driver's libcuda.so.1 is absent.
      # The toolkit ships a stub libcuda.so (link-time placeholder) -- expose it
      # as libcuda.so.1 on LD_LIBRARY_PATH so the binary loads and exercises the
      # graceful no-device path (cuInit returns CUDA_ERROR_STUB_LIBRARY) instead
      # of dying in the loader.
      - name: Run CUDA
        if: matrix.cuda
        shell: bash
        run: |
          # The toolkit stubs dir is root-owned, so symlink into a writable temp
          # dir (libcuda.so -> libcuda.so.1, the SONAME the binary needs) and put
          # that on LD_LIBRARY_PATH rather than mutating the toolkit.
          stub="${CUDA_PATH}/lib64/stubs/libcuda.so"
          link_dir="${RUNNER_TEMP}/cuda-stub"
          mkdir -p "$link_dir"
          [ -f "$stub" ] && ln -sf "$stub" "$link_dir/libcuda.so.1"
          export LD_LIBRARY_PATH="$link_dir:${LD_LIBRARY_PATH}"
          ${{ matrix.binary }} || true

      # oneAPI: the SYCL/OpenCL runtime libs live in the oneAPI install dir, so
      # source setvars.sh to put them on LD_LIBRARY_PATH (the build step does the
      # same).  Without it the loader can't find libOpenCL.so.1 and the binary
      # dies before main().
      - name: Run oneAPI
        if: matrix.oneapi
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh
          ${{ matrix.binary }} || true

      # Package with CPack into a self-contained zip whose top-level folder is
      # clpeak-<version>-<os>-<arch>[-backend], holding the binary, LICENSE, and
      # any bundled runtime libs.  -C Release picks the Release artifacts on
      # multi-config generators (Windows); harmless on single-config.
      - name: Package
        shell: bash
        run: cd build && cpack -G ZIP -C Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/clpeak-*.zip

  # ---------------------------------------------------------------------------
  # Android
  # ---------------------------------------------------------------------------
  build-android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: true
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: clpeak-android-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

  # ---------------------------------------------------------------------------
  # iOS
  # ---------------------------------------------------------------------------
  build-ios:
    name: iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: true
          cache: true

      - name: Configure CMake (iOS)
        run: cmake -S ios -B ios/build -G Xcode -DCMAKE_SYSTEM_NAME=iOS

      - name: Build (iOS device)
        run: cmake --build ios/build --config Release --target clpeak_ios -- -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clpeak-ios-app
          path: ios/build/Release-iphoneos/clpeak_ios.app

  # ---------------------------------------------------------------------------
  # GitHub Release — attach binaries on tag push
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    # Android is a sanity build only and is intentionally not shipped.
    needs: [build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          # Each desktop job already produced a CPack zip; just gather them.
          find artifacts -name 'clpeak-*.zip' -exec cp {} release/ \;
          ls -l release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
