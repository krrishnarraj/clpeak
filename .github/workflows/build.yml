name: Build

on:
  push:
    branches: [master, main]
    tags: ["*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Desktop builds (Linux x64, Linux arm64, Windows x64, macOS arm64)
  # ---------------------------------------------------------------------------
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-latest
            artifact: clpeak-linux-x86_64
            binary: build/clpeak
            cuda: false

          - name: Linux arm64
            runner: ubuntu-24.04-arm
            artifact: clpeak-linux-arm64
            binary: build/clpeak
            cuda: false

          - name: Windows x64
            runner: windows-latest
            artifact: clpeak-windows-x86_64
            binary: build/Release/clpeak.exe
            cuda: false

          - name: macOS arm64
            runner: macos-latest
            artifact: clpeak-macos-arm64
            binary: build/clpeak
            cuda: false

          - name: Linux x64 CUDA
            runner: ubuntu-latest
            artifact: clpeak-linux-x86_64-cuda
            binary: build/clpeak
            cuda: true

          - name: Linux x64 ROCm
            runner: ubuntu-22.04
            artifact: clpeak-linux-x86_64-rocm
            binary: build/clpeak
            cuda: false
            rocm: true

          - name: Linux x64 oneAPI
            runner: ubuntu-latest
            artifact: clpeak-linux-x86_64-oneapi
            binary: build/clpeak
            cuda: false
            oneapi: true

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git-describe versioning

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: true
          cache: true

      # CUDA Toolkit: install only for CUDA-enabled matrix entries.
      - name: Install CUDA Toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.35

      # ROCm SDK (HIP runtime + HIPRTC + rocBLAS + rocWMMA): install only for
      # ROCm-enabled matrix entries.  Ubuntu 22.04 (jammy) is the
      # best-supported ROCm host.  The runner image has no AMD GPU, so the
      # built binary will not actually execute the ROCm backend at run time;
      # this job exercises the compile path.
      - name: Install ROCm
        if: matrix.rocm
        run: |
          sudo mkdir --parents --mode=0755 /etc/apt/keyrings
          wget -O- https://repo.radeon.com/rocm/rocm.gpg.key \
            | gpg --dearmor | sudo tee /etc/apt/keyrings/rocm.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/6.2 jammy main" \
            | sudo tee /etc/apt/sources.list.d/rocm.list
          echo -e "Package: *\nPin: release o=repo.radeon.com\nPin-Priority: 600" \
            | sudo tee /etc/apt/preferences.d/rocm-pin-600
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            rocm-hip-runtime-dev hipcc rocblas-dev rocwmma-dev

      # Intel oneAPI Base Toolkit: DPC++ compiler (icpx) + oneMKL.  Same
      # caveat as ROCm above — the runner has no Intel GPU, so the resulting
      # binary will skip the oneAPI backend at run time.
      - name: Install Intel oneAPI
        if: matrix.oneapi
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            intel-oneapi-compiler-dpcpp-cpp intel-oneapi-mkl-devel

      - name: Configure CMake
        if: ${{ !matrix.oneapi }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        if: ${{ !matrix.oneapi }}
        run: cmake --build build --config Release -j4

      # oneAPI requires icpx as CXX and `setvars.sh` on the PATH/LD_LIBRARY_PATH;
      # source it before invoking cmake/build so IntelSYCL can be located.
      - name: Configure & Build (oneAPI)
        if: matrix.oneapi
        shell: bash
        run: |
          source /opt/intel/oneapi/setvars.sh
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=icpx
          cmake --build build --config Release -j4

      - name: Run cpu backend
        if: ${{ !matrix.cuda && !matrix.rocm && !matrix.oneapi }}
        shell: bash
        run: ${{ matrix.binary }} --cpu 2>&1

      # CUDA / ROCm / oneAPI binaries cannot launch on the default runner image
      # (no NVIDIA / AMD / Intel GPU driver present), so failure here is
      # expected and ignored.  oneAPI also needs setvars.sh on the path.
      - name: Run cpu backend (allow failure)
        if: ${{ matrix.cuda || matrix.rocm || matrix.oneapi }}
        shell: bash
        run: ${{ matrix.binary }} --cpu 2>&1 || true

      # Linux arm64 only: the FMA compute chains (fp32/fp64/fp16/mp) under-run on
      # Neoverse while the dot/matrix engines saturate, so dump the disassembly of
      # the hot kernels from the TU the runtime dispatcher actually selects (i8mm
      # on a full-feature Neoverse) to tell register spilling (ldr/str in the hot
      # loop) from plain FMA-latency under-saturation (clean back-to-back fmla).
      # Printed to the log and uploaded as an artifact.
      - name: Dump FMA kernel disassembly (Neoverse codegen)
        if: matrix.name == 'Linux arm64'
        shell: bash
        run: |
          set +e
          OBJ=$(find build -name 'cpu_kernels_tu.cpp.o' -path '*i8mm*' 2>/dev/null | head -1)
          [ -z "$OBJ" ] && OBJ=$(find build -name 'cpu_kernels_tu.cpp.o' 2>/dev/null | head -1)
          if [ -z "$OBJ" ]; then echo "no cpu_kernels_tu.cpp.o found; skipping"; exit 0; fi
          echo "Disassembling: $OBJ"
          objdump -dC --no-show-raw-insn "$OBJ" > cpu_kernels_full.s
          : > cpu_kernels_hot.s
          for fn in runFp32Chain runFp64Chain runFp16Chain runMpChain runBf16Chain; do
            blk=$(awk -v RS= -v fn="$fn" '$0 ~ ("<.*"fn".*>:")' cpu_kernels_full.s)
            echo "================ $fn ================" >> cpu_kernels_hot.s
            if [ -z "$blk" ]; then echo "(symbol not present in this TU)" >> cpu_kernels_hot.s; continue; fi
            printf '%s\n' "$blk" >> cpu_kernels_hot.s
            printf '>>> %s: fmla=%s fmlal=%s cvt=%s ldr/ldp=%s str/stp=%s\n' "$fn" \
              "$(printf '%s' "$blk" | grep -ciE '\bfmla\b')" \
              "$(printf '%s' "$blk" | grep -ci  'fmlal')" \
              "$(printf '%s' "$blk" | grep -ciE '\b[fsu]?cvt')" \
              "$(printf '%s' "$blk" | grep -ciE '\b(ldr|ldp)\b')" \
              "$(printf '%s' "$blk" | grep -ciE '\b(str|stp)\b')" >> cpu_kernels_hot.s
          done
          echo "===== hot-kernel spill/fmla summary (ldr/str in the loop => register spill) ====="
          grep '^>>>' cpu_kernels_hot.s || true
          echo "===== full hot-kernel disassembly ====="
          cat cpu_kernels_hot.s

      - name: Upload kernel disassembly (Linux arm64)
        if: matrix.name == 'Linux arm64'
        uses: actions/upload-artifact@v4
        with:
          name: clpeak-linux-arm64-kernel-asm
          path: |
            cpu_kernels_hot.s
            cpu_kernels_full.s
          if-no-files-found: warn

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  # ---------------------------------------------------------------------------
  # Android APK
  # ---------------------------------------------------------------------------
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: true
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: clpeak-android-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

  # ---------------------------------------------------------------------------
  # iOS app
  # ---------------------------------------------------------------------------
  build-ios:
    name: iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: true
          cache: true

      - name: Configure CMake (iOS)
        run: cmake -S ios -B ios/build -G Xcode -DCMAKE_SYSTEM_NAME=iOS

      - name: Build (iOS device)
        run: cmake --build ios/build --config Debug --target clpeak_ios -- -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clpeak-ios-app
          path: ios/build/Debug-iphoneos/clpeak_ios.app

  # ---------------------------------------------------------------------------
  # GitHub Release — attach binaries on tag push
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Package each desktop binary into a zip
          for dir in artifacts/clpeak-linux-x86_64 artifacts/clpeak-linux-x86_64-cuda artifacts/clpeak-linux-x86_64-rocm artifacts/clpeak-linux-x86_64-oneapi artifacts/clpeak-linux-arm64 artifacts/clpeak-macos-arm64; do
            name=$(basename "$dir")
            chmod +x "$dir"/* 2>/dev/null || true
            (cd "$dir" && zip -j "../../release/${name}.zip" *)
          done
          for dir in artifacts/clpeak-windows-x86_64; do
            name=$(basename "$dir")
            (cd "$dir" && zip -j "../../release/${name}.zip" *)
          done
          # Copy APK directly
          cp artifacts/clpeak-android-release/*.apk release/clpeak-android.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
