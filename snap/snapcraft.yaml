name: clpeak
base: core26
adopt-info: clpeak
summary: Benchmarking tool to measure peak capabilities of GPU compute devices
description: |
  clpeak is a synthetic micro-benchmark that measures the peak achievable
  performance of GPU compute devices. It exercises tight vector/MAD/MMA loops
  and vendor-SDK GEMM libraries across multiple backends.

  Supported backends: OpenCL, Vulkan, CUDA, ROCm, Metal, oneAPI, CPU

  Benchmarks include: global/local/image memory bandwidth, single/half/double
  precision compute, integer throughput, tensor operations (WMMA, cooperative
  matrices), vendor GEMM peaks and kernel launch latency.

  Output formats: plain text, XML, JSON, CSV

grade: stable
confinement: classic

apps:
  clpeak:
    command: usr/local/bin/clpeak

parts:
  clpeak:
    source: .
    plugin: cmake
    build-attributes:
      - enable-patchelf
    build-packages:
      - build-essential
      - git
      - cmake
      - ocl-icd-opencl-dev
      - opencl-headers
      - libvulkan-dev
      - glslang-tools
      - spirv-tools
      - glslc
    override-pull: |
      craftctl default
      version=$(git describe --tags --abbrev=0)
      craftctl set version="$version"
    stage-packages:
      - ocl-icd-libopencl1
      - libvulkan1
