name: clpeak
description: "clpeak — cross-API compute benchmark (OpenCL, Vulkan, CUDA, ROCm, Metal, oneAPI, CPU)."
publish_to: 'none'

# versionName / versionCode continue from the retired native Android app
# (2.0.18+30) and the iOS app.
version: 2.1.0+31

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  provider: ^6.1.0
  path: ^1.9.0
  path_provider: ^2.1.0
  share_plus: ^12.0.0
  file_selector: ^1.0.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
