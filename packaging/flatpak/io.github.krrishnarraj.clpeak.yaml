# Flatpak manifest for clpeak — Flathub submission.
#
# Scope: only the backends that can work inside the org.freedesktop sandbox are
# enabled — Vulkan, OpenCL, and the native CPU backend.  CUDA / ROCm / oneAPI
# need vendor toolkits + proprietary drivers that Flathub cannot ship, and Metal
# is macOS-only; those builds remain available via the GitHub release zips.
#
# Build chain provided by helper modules:
#   * shaderc        -> provides `glslc`, used at build time to compile the
#                       Vulkan GLSL compute shaders to SPIR-V
#                       (src/vulkan/cmake/CompileShaders.cmake hard-requires it).
#   * OpenCL-Headers + OpenCL-ICD-Loader -> link target for find_package(OpenCL).
#
# Local build / test:
#   flatpak install flathub org.freedesktop.Sdk//25.08 org.freedesktop.Platform//25.08 org.freedesktop.Sdk.Extension.llvm22/x86_64/25.08
#   flatpak run org.flatpak.Builder --force-clean --user --install \
#       build-dir packaging/flatpak/io.github.krrishnarraj.clpeak.yaml
#   flatpak run io.github.krrishnarraj.clpeak --list-devices
id: io.github.krrishnarraj.clpeak
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: clpeak

# Build-time only: clpeak's CMake auto-prefers clang over gcc for the CPU
# backend (GCC<=14 serialises the FMA accumulator chains, ~halving fp32/fp64);
# see the find_program(clang) block at the top of CMakeLists.txt.  The base SDK
# only ships gcc, so pull in the LLVM SDK extension and put it on PATH for the
# clpeak module (below).  llvm22 is the 25.08-branch extension; bump it together
# with runtime-version.
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm22

finish-args:
  - --device=dri          # GPU access for Vulkan / OpenCL
  - --share=ipc           # required alongside DRI on some drivers
  # The host NVIDIA Vulkan/GL driver is auto-mounted by Flatpak as a GL
  # extension; no extra arg needed.

modules:
  # --- glslc (shaderc) ---------------------------------------------------
  # Flathub builds offline, so shaderc's third-party deps are vendored into
  # third_party/ at the exact revisions pinned by shaderc's DEPS file
  # (v2026.2).  Tests/examples are skipped, so the test-only deps (effcee,
  # re2, abseil, googletest) are not required.
  - name: shaderc
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSHADERC_SKIP_TESTS=ON
      - -DSHADERC_SKIP_EXAMPLES=ON
      - -DSHADERC_SKIP_COPYRIGHT_CHECK=ON
      - -DSPIRV_SKIP_EXECUTABLES=ON
      - -DENABLE_GLSLANG_BINARIES=OFF
    cleanup:
      - /bin
      - /include
      - /lib/cmake
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/google/shaderc.git
        tag: v2026.2
        commit: baec0c74d6dca70c52d937e2e5bf6ffcd449e430
      - type: git
        url: https://github.com/KhronosGroup/glslang.git
        commit: 5ed4003a18a10a9d1bd7e43aaf1664499abffa83
        dest: third_party/glslang
      - type: git
        url: https://github.com/KhronosGroup/SPIRV-Tools.git
        commit: c1cb30bb04e2bf911755a40df1242cc6e3d83e26
        dest: third_party/spirv-tools
      - type: git
        url: https://github.com/KhronosGroup/SPIRV-Headers.git
        commit: ad9184e76a66b1001c29db9b0a3e87f646c64de0
        dest: third_party/spirv-headers

  # --- clpeak ------------------------------------------------------------
  - name: clpeak
    buildsystem: cmake-ninja
    # Put the LLVM extension's clang on PATH so CMake's find_program(clang)
    # picks it over the SDK's gcc for the CPU-backend codegen.
    build-options:
      append-path: /usr/lib/sdk/llvm22/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm22/lib
      build-args:
        - --share=network
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCLPEAK_ENABLE_CUDA=OFF
      - -DCLPEAK_ENABLE_ROCM=OFF
      - -DCLPEAK_ENABLE_ONEAPI=OFF
    post-install:
      - install -Dm644 /app/share/clpeak/LICENSE /app/share/licenses/io.github.krrishnarraj.clpeak/LICENSE
      - rm -f /app/share/clpeak/LICENSE
      - install -Dm644 packaging/flatpak/io.github.krrishnarraj.clpeak.metainfo.xml
          /app/share/metainfo/io.github.krrishnarraj.clpeak.metainfo.xml
    sources:
      - type: git
        url: https://github.com/krrishnarraj/clpeak.git
        tag: '2.0.15'
        commit: 5d7b3da31023054c0d8aa7b354647141d85f47ee